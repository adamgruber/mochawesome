name: CI (next)

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm --workspace packages/mochawesome run typecheck
      - run: npm --workspace packages/mochawesome run lint
      - run: npm --workspace packages/mochawesome run format:check
      - run: npm --workspace packages/mochawesome test
